name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Roda todo dia à meia-noite
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }} # Você precisaria criar este segredo
          user: seu-usuario
          template: classic
          base: header, community, repositories, metadata
